# ============================================================
# DATA SPLITS — разбиение данных
# ============================================================
test_size: 0.2
val_size: 0.1
sample_pct: 0.2

# ============================================================
# TABULAR FEATURES & PREPROCESSING (Для классического ML)
# ============================================================
tabular:
  # --- ВЕРСИОНИРОВАНИЕ ДАННЫХ И ФИЧЕЙ ---
  preprocessing_version: "1.1.0"  # Меняем, если изменился метод outlier или стратегии fill_value
  preprocessing_changelog: "Базовая очистка: медианы для чисел, мода для категорий, IQR для выбросов + удаление пустых колонок и строк Добавлен умное заполнение по мода и медиана по брендам"

  features_version: "1.0.5"       # Меняем, если добавили города, новые SQL-скрипты или кросс-фичи
  features_changelog: "Демография городов"

  aggrigation_version: "1.2.0"
  aggrigation_changelog: "произведена аггрегация в соответствии с engineering_aggregation.sql добавлены фичи на энтропию поведения плюс продолжается борьба с утечкой данных"


  target_col: "event_value"
  client_id_col: "client_id"
  drop_cols: ["session_id", "client_id", "rn"]
  num_fill_strategy: "median"
  cat_fill_strategy: "mode"
  outlier_method: "iqr"
  outlier_threshold: 1.5
  skip_imputation_cols: []
  top_n_categories: 20

  # --- SMART DROPPING ---
  max_missing_pct: 0.90
  max_constant_pct: 0.99
  max_row_missing_pct: 0.5

  # ============================================================
  # БИЗНЕС-ПРАВИЛА И КЛЮЧИ ДЛЯ FEATURE ENGINEERING
  # ============================================================
  
  # Значение-заглушка для числовых фич, если целевого действия не было в сессии
  missing_target_value: -1

  # Список целевых действий (ga_hits.event_action)
  target_event_actions:
    - "sub_car_claim_click"
    - "sub_car_claim_submit_click"
    - "sub_open_dialog_click"
    - "sub_custom_question_submit_click"
    - "sub_call_number_click"
    - "sub_callback_submit_click"
    - "sub_submit_success"
    - "sub_car_request_submit_click"

  # Медиумы органического трафика (ga_sessions.utm_medium)
  organic_mediums:
    - "organic"
    - "referral"
    - "(none)"

  # Каналы рекламы в социальных сетях (ga_sessions.utm_source)
  social_ad_sources:
    - "QxAxdyPLuQMEcrdZWdWb"
