# configs/model/catboost.yaml
name: "catboost"
model_version: "0.1.0"
model_changelog: "Стартовый бейзлайн: дефолтные параметры, включен auto_class_weights для борьбы с дисбалансом"

params:
  auto_class_weights: "Balanced"
  iterations: 1000
  learning_rate: 0.05
  depth: 6
optuna_search_space:
  iterations: [100, 1000]
  depth: [4, 10]
  learning_rate: [0.001, 0.1]
  l2_leaf_reg: [1, 10]