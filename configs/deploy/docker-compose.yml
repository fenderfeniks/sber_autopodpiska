version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-mlflow_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-mlflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ml_network

  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin}@postgres:5432/${DB_NAME:-mlflow_db}
      --default-artifact-root /mlruns
      --host 0.0.0.0
    volumes:
      - mlruns_data:/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ml_network

networks:
  ml_network:
    driver: bridge

volumes:
  pg_data:
  mlruns_data: